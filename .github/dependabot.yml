# Keep GitHub Actions current. The workflows pin actions to commit SHAs for
# supply-chain safety (a mutable tag can be repointed); Dependabot bumps both the
# SHA and its version comment by PR so the pins don't go stale.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
