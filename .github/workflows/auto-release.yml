name: Auto-release

# Create a GitHub Release (and its tag) when a plugin's version is bumped
# on main AND the CHANGELOG contains an entry for that version.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create releases for updated plugin versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          released=0

          for manifest in plugins/*/.claude-plugin/plugin.json; do
            plugin_dir="${manifest%/.claude-plugin/plugin.json}"
            plugin="$(basename "$plugin_dir")"
            version="$(jq -r '.version' "$manifest")"
            tag="${plugin}--v${version}"

            # Skip if the tag already exists (release already created)
            if git rev-parse --verify "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag $tag already exists – skipping."
              continue
            fi

            # Require a matching CHANGELOG entry (## [<version>])
            changelog="${plugin_dir}/../../CHANGELOG.md"
            if [ ! -f "$changelog" ]; then
              changelog="CHANGELOG.md"
            fi
            if ! grep -qF "## [${version}]" "$changelog"; then
              echo "::warning::No CHANGELOG entry for $tag – skipping."
              continue
            fi

            # Extract release notes for this version from CHANGELOG.md
            notes="$(awk -v ver="## [${version}]" '
              /^## \[/ { if (found) exit; if (index($0, ver) == 1) { found = 1; print; next } }
              found { print }
            ' "$changelog")"
            [ -z "$notes" ] && notes="Release ${tag}."

            echo "Creating release $tag"
            printf '%s' "$notes" > /tmp/release-notes.md
            gh release create "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${plugin} v${version}" \
              --notes-file /tmp/release-notes.md
            released=$((released + 1))
          done

          echo "Releases created: $released"
