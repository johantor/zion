name: Auto-release

# Create a GitHub Release (and its tag) when a plugin's version is bumped
# on main AND the CHANGELOG contains an entry for that version.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: the "already released?" check below needs every tag,
          # and a shallow checkout doesn't deliver them — `fetch-tags: true`
          # with the default depth only follows tags that point into the
          # fetched history, which silently broke the check (see #130's
          # follow-up fix).
          fetch-depth: 0

      - name: Create releases for updated plugin versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          released=0
          failed=0

          for manifest in plugins/*/.claude-plugin/plugin.json; do
            plugin_dir="${manifest%/.claude-plugin/plugin.json}"
            plugin="$(basename "$plugin_dir")"
            version="$(jq -r '.version' "$manifest")"
            tag="${plugin}/v${version}"

            # Skip if the tag already exists (release already created)
            if git rev-parse --verify "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag $tag already exists – skipping."
              continue
            fi

            # Require a matching CHANGELOG entry (## [<version>]) in the
            # plugin's own CHANGELOG.md — every plugin keeps its changelog next
            # to its manifest (validate-plugin.sh §2h enforces the pairing).
            changelog="${plugin_dir}/CHANGELOG.md"
            if [ ! -f "$changelog" ] || ! grep -qF "## [${version}]" "$changelog"; then
              echo "::warning::No CHANGELOG entry for $tag – skipping."
              continue
            fi

            # Extract release notes for this version from CHANGELOG.md
            notes="$(awk -v ver="## [${version}]" '
              /^## \[/ { if (found) exit; if (index($0, ver) == 1) { found = 1; print; next } }
              found { print }
            ' "$changelog")"
            [ -z "$notes" ] && notes="Release ${tag}."

            echo "Creating release $tag"
            printf '%s' "$notes" > /tmp/release-notes.md
            # One plugin's failure must not silently skip the plugins after it
            # in the loop — record it, keep going, and fail the job at the end.
            if gh release create "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${plugin} v${version}" \
              --notes-file /tmp/release-notes.md; then
              released=$((released + 1))
            else
              echo "::error::Failed to create release $tag"
              failed=$((failed + 1))
            fi
          done

          echo "Releases created: $released"
          if [ "$failed" -ne 0 ]; then
            echo "::error::$failed release(s) failed"
            exit 1
          fi
