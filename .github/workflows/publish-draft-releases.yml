name: Publish draft releases

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-draft-releases.yml

jobs:
  publish-drafts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish all draft releases (except latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching draft releases..."
          drafts=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 200 \
            --json tagName,isDraft -q '.[] | select(.isDraft) | .tagName')

          if [ -z "$drafts" ]; then
            echo "No draft releases found."
            exit 0
          fi

          echo "Draft releases to publish:"
          echo "$drafts"
          echo ""

          # Find the current latest release tag so we don't disturb it
          latest_tag=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 200 \
            --json tagName,isLatest -q '.[] | select(.isLatest) | .tagName' | head -1)
          echo "Current latest release: ${latest_tag:-none}"

          published=0
          failed=0

          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo -n "Publishing $tag ... "
            if gh release edit "$tag" --draft=false --latest=false \
                 --repo "$GITHUB_REPOSITORY" 2>&1; then
              echo "OK"
              published=$((published + 1))
            else
              echo "FAILED"
              failed=$((failed + 1))
            fi
          done <<< "$drafts"

          echo ""
          echo "Done. Published: $published  Failed: $failed"
          if [ "$failed" -gt 0 ]; then
            exit 1
          fi
