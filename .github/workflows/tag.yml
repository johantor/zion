name: Auto-tag

# Push a release tag (<plugin>--v<version>) when a plugin's version is bumped
# on main AND the CHANGELOG contains an entry for that version.
# The tag then triggers the release workflow to create a GitHub Release.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tags for updated plugin versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tagged=0

          for manifest in plugins/*/.claude-plugin/plugin.json; do
            plugin_dir="${manifest%/.claude-plugin/plugin.json}"
            plugin="$(basename "$plugin_dir")"
            version="$(jq -r '.version' "$manifest")"
            tag="${plugin}--v${version}"

            # Skip if the tag already exists
            if git rev-parse --verify "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag $tag already exists – skipping."
              continue
            fi

            # Require a matching CHANGELOG entry (## [<version>])
            changelog="${plugin_dir}/../../CHANGELOG.md"
            if [ ! -f "$changelog" ]; then
              changelog="CHANGELOG.md"
            fi
            if ! grep -qF "## [${version}]" "$changelog"; then
              echo "::warning::No CHANGELOG entry for $tag – skipping."
              continue
            fi

            echo "Creating tag $tag"
            git tag "$tag"
            git push origin "$tag"
            tagged=$((tagged + 1))
          done

          echo "Tags created: $tagged"
