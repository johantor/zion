name: Validate

# Push runs are limited to main: every other branch gets validated through its
# pull_request events, so a bare `push` trigger would run everything twice per
# PR commit.
on:
  push:
    branches:
      - main
  pull_request:

# Cancel superseded runs on rapid pushes to the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Lint hook & script shell files
        run: shellcheck plugins/*/hooks/*.sh plugins/*/tests/*.sh scripts/*.sh

  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Validate plugin manifest & structure
        run: scripts/validate-plugin.sh

  hook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Run crew hook behavior tests
        run: bash plugins/crew/tests/run.sh
