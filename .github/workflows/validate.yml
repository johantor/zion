name: Validate

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint hook & script shell files
        run: shellcheck .claude/hooks/*.sh .claude/scripts/*.sh

  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin manifest & structure
        run: .claude/scripts/validate-plugin.sh
